name: west-ai-agent

services:
  postgres:
    container_name: west-ai-agent-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:?set POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-platform}
    ports:
      - "${POSTGRES_PORT:-15432}:5432"

  redis:
    container_name: west-ai-agent-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "${REDIS_PORT:-16379}:6379"

  minio:
    container_name: west-ai-agent-minio
    restart: unless-stopped
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?set MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?set MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT:-19000}:9000"
      - "${MINIO_CONSOLE_PORT:-19001}:9001"

  opensearch:
    container_name: west-ai-agent-opensearch
    restart: unless-stopped
    environment:
      discovery.type: single-node
      DISABLE_INSTALL_DEMO_CONFIG: "true"
      DISABLE_SECURITY_PLUGIN: "${OPENSEARCH_DISABLE_SECURITY_PLUGIN:-true}"
      OPENSEARCH_INITIAL_ADMIN_PASSWORD: ${OPENSEARCH_INITIAL_ADMIN_PASSWORD:?set OPENSEARCH_INITIAL_ADMIN_PASSWORD}
      OPENSEARCH_JAVA_OPTS: "${OPENSEARCH_JAVA_OPTS:--Xms1g -Xmx1g}"
    ports:
      - "${OPENSEARCH_HTTP_PORT:-19200}:9200"
      - "${OPENSEARCH_METRICS_PORT:-19600}:9600"

  platform-api:
    container_name: west-ai-agent-platform-api
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: services/platform-api/Dockerfile
    environment:
      APP_ENV: production
      APP_NAME: platform-api
      APP_HOST: 0.0.0.0
      APP_PORT: 8000
      APP_DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:?set POSTGRES_USER}:${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB:-platform}
      APP_JWT_SECRET: ${APP_JWT_SECRET:?set APP_JWT_SECRET}
      APP_JWT_ALGORITHM: HS256
      APP_CORS_ORIGINS: '${APP_CORS_ORIGINS:-["http://127.0.0.1:8080","http://127.0.0.1:8081"]}'
      APP_DEFAULT_ADMIN_USERNAME: ${APP_DEFAULT_ADMIN_USERNAME:-admin}
      APP_DEFAULT_ADMIN_PASSWORD: ${APP_DEFAULT_ADMIN_PASSWORD:-admin123}
      APP_BOOTSTRAP_DEFAULT_ADMIN: ${APP_BOOTSTRAP_DEFAULT_ADMIN:-false}
      APP_BOOTSTRAP_SAMPLE_DATA: ${APP_BOOTSTRAP_SAMPLE_DATA:-false}
      APP_REDIS_URL: redis://redis:6379/0
      APP_OPENSEARCH_URL: http://opensearch:9200
      APP_MINIO_ENDPOINT: minio:9000
    depends_on:
      - postgres
      - redis
      - minio
      - opensearch
    ports:
      - "${PLATFORM_API_PORT:-18000}:8000"

  message-gateway:
    container_name: west-ai-agent-message-gateway
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: services/message-gateway/Dockerfile
    environment:
      APP_ENV: production
      APP_NAME: message-gateway
      APP_GATEWAY_HOST: 0.0.0.0
      APP_GATEWAY_PORT: 8010
      APP_CORS_ORIGINS: '${APP_CORS_ORIGINS:-["http://127.0.0.1:8080","http://127.0.0.1:8081"]}'
    ports:
      - "${MESSAGE_GATEWAY_PORT:-18010}:8010"

  ai-service:
    container_name: west-ai-agent-ai-service
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: services/ai-service/Dockerfile
    environment:
      APP_ENV: production
      APP_NAME: ai-service
      APP_AI_HOST: 0.0.0.0
      APP_AI_PORT: 8020
      APP_CORS_ORIGINS: '${APP_CORS_ORIGINS:-["http://127.0.0.1:8080","http://127.0.0.1:8081"]}'
      AI_SERVICE_DEFAULT_PROVIDER: ${AI_SERVICE_DEFAULT_PROVIDER:-openai_like}
      AI_SERVICE_OPENAI_LIKE_BASE_URL: ${AI_SERVICE_OPENAI_LIKE_BASE_URL:?set AI_SERVICE_OPENAI_LIKE_BASE_URL}
      AI_SERVICE_OPENAI_LIKE_API_KEY: ${AI_SERVICE_OPENAI_LIKE_API_KEY:?set AI_SERVICE_OPENAI_LIKE_API_KEY}
      AI_SERVICE_VLLM_BASE_URL: ${AI_SERVICE_VLLM_BASE_URL:-http://host.docker.internal:8100/v1}
      AI_SERVICE_OLLAMA_BASE_URL: ${AI_SERVICE_OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      AI_SERVICE_OPENSEARCH_URL: http://opensearch:9200
      AI_SERVICE_OPENSEARCH_INDEX: ${AI_SERVICE_OPENSEARCH_INDEX:-knowledge_chunks}
      AI_SERVICE_OPENSEARCH_USERNAME: ${AI_SERVICE_OPENSEARCH_USERNAME:-}
      AI_SERVICE_OPENSEARCH_PASSWORD: ${AI_SERVICE_OPENSEARCH_PASSWORD:-}
      QWEN_API_KEY: ${QWEN_API_KEY:-}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - opensearch
    ports:
      - "${AI_SERVICE_PORT:-18020}:8020"

  worker-jobs:
    container_name: west-ai-agent-worker-jobs
    restart: "no"
    profiles:
      - jobs
    build:
      context: ../..
      dockerfile: services/worker-jobs/Dockerfile
    environment:
      WORKER_JOBS_OBJECT_STORAGE_PROVIDER: ${WORKER_JOBS_OBJECT_STORAGE_PROVIDER:-minio}
      WORKER_JOBS_SEARCH_INDEX_PROVIDER: ${WORKER_JOBS_SEARCH_INDEX_PROVIDER:-opensearch}
      WORKER_JOBS_MINIO_ENDPOINT: minio:9000
      WORKER_JOBS_MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-minio}
      WORKER_JOBS_MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-minio123}
      WORKER_JOBS_MINIO_BUCKET: ${WORKER_JOBS_MINIO_BUCKET:-knowledge}
      WORKER_JOBS_MINIO_SECURE: "false"
      WORKER_JOBS_MINIO_OBJECT_PREFIX: ${WORKER_JOBS_MINIO_OBJECT_PREFIX:-knowledge}
      WORKER_JOBS_OPENSEARCH_URL: http://opensearch:9200
      WORKER_JOBS_OPENSEARCH_INDEX: ${WORKER_JOBS_OPENSEARCH_INDEX:-knowledge_chunks}
      WORKER_JOBS_OPENSEARCH_USERNAME: ${WORKER_JOBS_OPENSEARCH_USERNAME:-}
      WORKER_JOBS_OPENSEARCH_PASSWORD: ${WORKER_JOBS_OPENSEARCH_PASSWORD:-}
    depends_on:
      - minio
      - opensearch
    command: ["worker-jobs", "--job", "smoke"]

  admin-web:
    container_name: west-ai-agent-admin-web
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: apps/admin-web/Dockerfile
      args:
        VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL:-http://127.0.0.1:8000}
    depends_on:
      - platform-api
    ports:
      - "${ADMIN_WEB_PORT:-14173}:80"

  customer-h5:
    container_name: west-ai-agent-customer-h5
    restart: unless-stopped
    build:
      context: ../..
      dockerfile: apps/customer-h5/Dockerfile
      args:
        VITE_PLATFORM_API_BASE_URL: ${VITE_PLATFORM_API_BASE_URL:-http://127.0.0.1:8000}
        VITE_MESSAGE_GATEWAY_WS_URL: ${VITE_MESSAGE_GATEWAY_WS_URL:-ws://127.0.0.1:8010/ws}
        VITE_AI_SERVICE_BASE_URL: ${VITE_AI_SERVICE_BASE_URL:-http://127.0.0.1:8020}
    depends_on:
      - platform-api
      - message-gateway
      - ai-service
    ports:
      - "${CUSTOMER_H5_PORT:-14174}:80"
